<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" id="theme-color-meta" content="#030712" />
    <script>
      (function () {
        var meta = document.getElementById('theme-color-meta');
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function apply() { meta.setAttribute('content', mq.matches ? '#030712' : '#F3F4F6'); }
        apply();
        mq.addEventListener('change', apply);
      })();
    </script>
    <meta name="description" content="Track your spending with ease" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Spendy" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=block" rel="stylesheet" />
    <link rel="preconnect" href="https://yawvflmnqsbwzzvnuqui.supabase.co" />
    <link rel="preload" href="/fonts/DancingScript-Bold.woff2" as="font" type="font/woff2" crossorigin />
    <title>Spendy</title>
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
